<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevStackBox Loading Test</title>
    <style>
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.9);
            display: none !important; /* Hidden by default */
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .loading-overlay.show {
            display: flex !important;
        }
        
        .loading-content {
            text-align: center;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .test-content {
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="test-content">
        <h1>DevStackBox Loading Test</h1>
        <p>This tests the loading overlay functionality</p>
        <button onclick="showLoading()">Show Loading</button>
        <button onclick="hideLoading()">Hide Loading</button>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p id="loadingText">Loading DevStackBox...</p>
        </div>
    </div>

    <script>
        function showLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.classList.add('show');
            }
        }
        
        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.classList.remove('show');
            }
        }
        
        // Auto-hide after 3 seconds
        setTimeout(() => {
            hideLoading();
            console.log('Loading overlay hidden automatically');
        }, 3000);
    </script>
</body>
</html>
