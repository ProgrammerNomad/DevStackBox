[mysqld]
# DevStackBox MySQL Configuration
port=3306
socket=mysql.sock

# Directories
basedir = C:/xampp/htdocs/DevStackBox/mysql
datadir = C:/xampp/htdocs/DevStackBox/mysql/data
tmpdir=C:/xampp/htdocs/DevStackBox/mysql/tmp
log-error = C:/xampp/htdocs/DevStackBox/mysql/logs/error.log
pid-file=C:/xampp/htdocs/DevStackBox/mysql/data/mysql.pid

# Security
skip-networking=false
bind-address=127.0.0.1

# Performance
max_connections=100
key_buffer_size=16M
max_allowed_packet=16M
table_open_cache=64
sort_buffer_size=512K
net_buffer_length=8K
read_buffer_size=256K
read_rnd_buffer_size=512K
myisam_sort_buffer_size=8M

# Character set
character-set-server=utf8mb4
collation-server=utf8mb4_unicode_ci

# InnoDB
default-storage-engine=INNODB
innodb_buffer_pool_size=128M
innodb_log_file_size=10M
innodb_log_buffer_size=8M
innodb_flush_log_at_trx_commit=1
innodb_lock_wait_timeout=50

[mysql]
default-character-set=utf8mb4

[client]
port=3306
socket=mysql.sock
default-character-set=utf8mb4
